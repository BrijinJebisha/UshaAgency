<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" fill="#0a0a0a" stroke="url(#goldRing)" stroke-width="4"/>

  <!-- Cycle wheel spokes -->
  <circle cx="100" cy="100" r="55" stroke="url(#goldSpoke)" stroke-width="2.5" stroke-dasharray="8 6" opacity="0.5"/>
  <circle cx="100" cy="100" r="14" fill="url(#goldCenter)"/>
  <line x1="100" y1="45" x2="100" y2="155" stroke="url(#goldSpoke)" stroke-width="2" opacity="0.5"/>
  <line x1="45" y1="100" x2="155" y2="100" stroke="url(#goldSpoke)" stroke-width="2" opacity="0.5"/>
  <line x1="61" y1="61" x2="139" y2="139" stroke="url(#goldSpoke)" stroke-width="2" opacity="0.5"/>
  <line x1="139" y1="61" x2="61" y2="139" stroke="url(#goldSpoke)" stroke-width="2" opacity="0.5"/>

  <!-- Sewing needle -->
  <line x1="115" y1="72" x2="85" y2="128" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <ellipse cx="115" cy="70" rx="5" ry="8" fill="white" transform="rotate(-30 115 70)"/>
  <ellipse cx="115" cy="70" rx="2" ry="3.5" fill="#0a0a0a" transform="rotate(-30 115 70)"/>
  <path d="M85 128 Q70 148 90 155" stroke="url(#goldThread)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Letter U -->
  <text x="100" y="107" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="url(#goldText)">U</text>

  <defs>
    <linearGradient id="goldRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="goldSpoke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#f5c842"/>
    </linearGradient>
    <linearGradient id="goldCenter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#f5c842"/>
    </linearGradient>
    <linearGradient id="goldThread" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
  </defs>
</svg>
